<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Займи малыша</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fdfbf7;
        }

        .radio-peer:checked + label {
            border-color: #f97316;
            background-color: #fff7ed;
            box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.1), 0 2px 4px -1px rgba(249, 115, 22, 0.06);
            transform: scale(1.02);
        }

        .dropdown-content {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.2s ease-out;
        }
        .dropdown-content.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .dropdown-content::-webkit-scrollbar {
            width: 6px;
        }
        .dropdown-content::-webkit-scrollbar-thumb {
            background-color: #fed7aa;
            border-radius: 4px;
        }

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">

    <div class="fixed top-[-5%] right-[-10%] w-64 h-64 bg-[#D0C5B1] rounded-full mix-blend-multiply filter blur-3xl opacity-40 z-0"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-72 h-72 bg-orange-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 z-0"></div>

    <div class="max-w-md w-full bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.06)] p-6 md:p-8 space-y-8 relative z-10 border border-stone-100">

        <div class="text-center">
            <h1 class="text-3xl font-bold text-orange-500 tracking-tight mb-2">🧸 Займи малыша</h1>
            <p class="text-sm font-bold text-stone-400 uppercase tracking-wider">5 минут · подручные вещи · без экранов</p>
        </div>

        <form id="game-form" class="space-y-7">

            <div class="space-y-3">
                <label class="block text-stone-700 font-bold ml-1 text-lg">Сколько лет ребёнку?</label>
                <div class="grid grid-cols-4 gap-2">
                    <div>
                        <input type="radio" name="age" id="age-1" value="1-2" class="hidden radio-peer" checked>
                        <label for="age-1" class="flex flex-col items-center justify-center p-3 border-2 border-stone-100 rounded-2xl cursor-pointer hover:bg-stone-50 transition-all duration-200">
                            <span class="text-2xl mb-1 drop-shadow-sm">🐣</span>
                            <span class="text-xs font-bold text-stone-600">1–2</span>
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="age" id="age-2" value="3-4" class="hidden radio-peer">
                        <label for="age-2" class="flex flex-col items-center justify-center p-3 border-2 border-stone-100 rounded-2xl cursor-pointer hover:bg-stone-50 transition-all duration-200">
                            <span class="text-2xl mb-1 drop-shadow-sm">🧸</span>
                            <span class="text-xs font-bold text-stone-600">3–4</span>
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="age" id="age-3" value="5-6" class="hidden radio-peer">
                        <label for="age-3" class="flex flex-col items-center justify-center p-3 border-2 border-stone-100 rounded-2xl cursor-pointer hover:bg-stone-50 transition-all duration-200">
                            <span class="text-2xl mb-1 drop-shadow-sm">🚀</span>
                            <span class="text-xs font-bold text-stone-600">5–6</span>
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="age" id="age-4" value="7+" class="hidden radio-peer">
                        <label for="age-4" class="flex flex-col items-center justify-center p-3 border-2 border-stone-100 rounded-2xl cursor-pointer hover:bg-stone-50 transition-all duration-200">
                            <span class="text-2xl mb-1 drop-shadow-sm">🌟</span>
                            <span class="text-xs font-bold text-stone-600">7+</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-3 relative">
                <label class="block text-stone-700 font-bold ml-1 text-lg">Что есть под рукой?</label>
                <button type="button" id="dropdown-btn" class="w-full flex items-center justify-between bg-white border-2 border-stone-100 rounded-2xl p-4 text-left text-stone-500 hover:bg-stone-50 transition-colors focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-50">
                    <span id="dropdown-text" class="truncate font-bold">Выбрать предметы...</span>
                    <svg class="w-5 h-5 text-stone-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>

                <div id="dropdown-menu" class="dropdown-content absolute z-30 w-full mt-2 bg-white border border-stone-100 rounded-2xl shadow-xl max-h-56 overflow-y-auto">
                    <div class="p-2 space-y-1 flex flex-col" id="materials-list"></div>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-stone-700 font-bold ml-1 text-lg">Сколько времени есть?</label>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <input type="radio" name="time" id="time-1" value="3-5" class="hidden radio-peer" checked>
                        <label for="time-1" class="flex items-center justify-center p-3 border-2 border-stone-100 rounded-2xl cursor-pointer hover:bg-stone-50 transition-all duration-200 text-sm font-bold text-stone-600">
                            3–5 мин
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="time" id="time-2" value="10" class="hidden radio-peer">
                        <label for="time-2" class="flex items-center justify-center p-3 border-2 border-stone-100 rounded-2xl cursor-pointer hover:bg-stone-50 transition-all duration-200 text-sm font-bold text-stone-600">
                            10 мин
                        </label>
                    </div>
                    <div>
                        <input type="radio" name="time" id="time-3" value="20+" class="hidden radio-peer">
                        <label for="time-3" class="flex items-center justify-center p-3 border-2 border-stone-100 rounded-2xl cursor-pointer hover:bg-stone-50 transition-all duration-200 text-sm font-bold text-stone-600">
                            20+ мин
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-orange-400 to-amber-500 text-white font-bold text-xl rounded-2xl py-4 mt-4 shadow-[0_8px_20px_rgba(249,115,22,0.3)] hover:shadow-[0_10px_25px_rgba(249,115,22,0.4)] hover:-translate-y-0.5 transform transition-all active:translate-y-0 active:scale-[0.98]">
                Дай игру! 🎲
            </button>
        </form>

        <div id="result-block" class="hidden mt-6 bg-[#fdfaf5] border-2 border-amber-100 rounded-3xl p-6 relative z-10 shadow-sm">
            <div class="absolute top-4 right-4 text-3xl opacity-20">💡</div>
            <h2 id="res-title" class="text-2xl font-bold text-stone-800 mb-3 pr-8">Название игры</h2>

            <div class="flex flex-wrap gap-2 mb-5" id="res-tags"></div>

            <div id="res-desc" class="text-stone-600 text-base leading-relaxed space-y-3 font-bold opacity-90"></div>

            <button id="next-game-btn" type="button" class="mt-5 w-full bg-white text-orange-500 border-2 border-orange-300 font-bold text-base rounded-2xl py-3 hover:bg-orange-50 transition-all active:scale-[0.98]">
                🔄 Другая игра
            </button>
        </div>
    </div>

    <script>
        const games = [
            // ── 1-2 года ──────────────────────────────────────────────────────────────
            {
                title: "Шуршащие носки",
                ages: ["1-2"],
                materials: ["чистые детские носки", "бумага"],
                time: ["10"],
                desc: "1. Возьмите пару чистых носков.\n2. Набейте их скомканной бумагой или фольгой.\n3. Завяжите узлом.\n4. Дайте малышу мять, бросать и изучать новые звуки. Отличная сенсорика без мусора."
            },
            {
                title: "Барабанная установка",
                ages: ["1-2"],
                materials: ["кастрюли", "ложки"],
                time: ["10"],
                desc: "1. Переверните несколько безопасных кастрюль и пластиковых контейнеров вверх дном.\n2. Выдайте ребенку деревянные или пластиковые ложки.\n3. Покажите, как стучать по разным поверхностям, извлекая разные звуки.\n4. Шумно, но гарантированно увлекает на 10–15 минут."
            },
            {
                title: "Картонный тоннель",
                ages: ["1-2"],
                materials: ["коробка"],
                time: ["10"],
                desc: "1. Возьмите большую картонную коробку от доставки или бытовой техники.\n2. Откройте створки с двух сторон, чтобы получилась сквозная труба.\n3. Сядьте с одной стороны и зовите малыша: «Ку-ку! Иди ко мне!»\n4. Дети обожают замкнутые пространства. Безопасно и увлекательно."
            },
            {
                title: "Разрывание газет",
                ages: ["1-2"],
                materials: ["газеты"],
                time: ["10"],
                desc: "1. Дайте ребенку стопку ненужной макулатуры.\n2. Покажите, как с хрустом рвать бумагу на длинные полоски.\n3. Соберите обрывки в кучу и устройте «листопад».\n4. Снятие стресса для ребенка и мощная прокачка силы кисти."
            },
            {
                title: "Бутылочка-погремушка",
                ages: ["1-2"],
                materials: ["пластиковая бутылка", "макароны", "фасоль"],
                time: ["10"],
                desc: "1. Выдайте малышу пустую бутылку с узким горлышком и горсть сухих макарон.\n2. Задача — засунуть все макаронины внутрь по одной.\n3. Закрутите крышку и дайте потрясти.\n4. Два в одном: тренировка пинцетного захвата и музыкальный инструмент."
            },
            {
                title: "Ватные облака",
                ages: ["1-2"],
                materials: ["ватные диски", "глубокая тарелка"],
                time: ["10"],
                desc: "1. Рассыпьте по полу ватные диски.\n2. Дайте ребенку пустую пластиковую миску.\n3. Задача — собрать все «облака» в миску.\n4. Максимально простое задание на понимание инструкций и фокусировку."
            },
            {
                title: "Сенсорный салют",
                ages: ["1-2"],
                materials: ["бумага"],
                time: ["3-5"],
                desc: "1. Дайте малышу разные виды бумаги (салфетки, газеты, обычную).\n2. Позвольте от души рвать её на самые мелкие кусочки.\n3. Соберите кусочки в охапку и подбросьте вверх, как праздничный салют."
            },
            {
                title: "Прятки «Ку-ку»",
                ages: ["1-2", "3-4"],
                materials: ["🤷‍♀️ Ничего"],
                time: ["3-5", "10"],
                desc: "1. Спрячьте лицо за ладонями.\n2. Спросите малыша: «А где мама/папа?»\n3. Резко откройте лицо с радостным возгласом «Ку-ку!»\n4. Детям постарше можно усложнить: прячьтесь за мебелью или дверью."
            },
            {
                title: "Бумажный баскетбол",
                ages: ["1-2", "3-4", "5-6"],
                materials: ["бумага", "коробка"],
                time: ["3-5", "10"],
                desc: "1. Дайте ребенку бумагу и покажите, как скомкать её в плотные шарики.\n2. Поставьте пустую коробку на расстоянии пары шагов.\n3. Устройте соревнование: кто забросит больше «снежков» в корзину!\n4. Отлично развивает крупную моторику и меткость."
            },
            {
                title: "Домашняя полоса препятствий",
                ages: ["1-2", "3-4"],
                materials: ["подушки"],
                time: ["10", "20+"],
                desc: "1. Разложите подушки на полу в линию, зигзагом или кругом.\n2. Задача ребенка: перешагивать, переползать или перепрыгивать с подушки на подушку.\n3. Можно добавить правило: «Пол — это горячая лава, наступать нельзя!»"
            },
            {
                title: "Тоннель из стульев",
                ages: ["1-2", "3-4"],
                materials: ["стулья", "плед"],
                time: ["10", "20+"],
                desc: "1. Поставьте 2–3 стула в ряд.\n2. Накиньте сверху большой плед или простыню, чтобы стало темно.\n3. Положите в конец тоннеля любимую игрушку.\n4. Покажите малышу, как проползать под стульями. Тренирует крупную моторику и смелость."
            },
            {
                title: "Липкие спасатели",
                ages: ["1-2", "3-4"],
                materials: ["малярный скотч", "игрушки"],
                time: ["10", "20+"],
                desc: "1. Приклейте несколько мелких игрушек малярным скотчем к полу или противню.\n2. Задача малыша — подцепить скотч пальчиками и освободить игрушку.\n3. Тренирует пинцетный захват и настойчивость."
            },
            {
                title: "Снежки из фольги",
                ages: ["1-2", "3-4"],
                materials: ["пищевая фольга", "коробка"],
                time: ["10"],
                desc: "1. Дайте ребенку рулон обычной пищевой фольги.\n2. Пусть он отрывает куски и сминает их в плотные блестящие шарики.\n3. Устройте соревнование: кто забросит больше шариков в пустую коробку.\n4. Фольга отлично держит форму и шуршит."
            },
            {
                title: "Рыбалка в тазу",
                ages: ["1-2", "3-4", "5-6"],
                materials: ["вода", "крышки", "ложки"],
                time: ["10", "20+"],
                desc: "1. Налейте в глубокий таз немного воды и бросьте туда пластиковые крышки.\n2. Дайте ребенку столовую ложку или небольшой половник.\n3. Задача: выловить все крышки из воды и сложить их в отдельную емкость."
            },
            {
                title: "Ёжик теряет иголки",
                ages: ["1-2", "3-4"],
                materials: ["прищепки", "коробка"],
                time: ["10"],
                desc: "1. Возьмите край плотной коробки.\n2. Нацепите прищепки по всему краю — это «иголки ежика».\n3. Попросите малыша аккуратно снять каждую прищепку, нажимая на неё.\n4. Затем предложите нацепить их обратно. Мощная тренировка для пальчиков!"
            },
            {
                title: "Цветная сортировка",
                ages: ["1-2", "3-4"],
                materials: ["крышки"],
                time: ["10"],
                desc: "1. Соберите все имеющиеся крышки в одну большую кучу.\n2. Попросите ребенка разложить их на группы по цветам (красные к красным, зеленые к зеленым).\n3. Усложнение: предложите сортировать по размеру или выложить из них узор."
            },
            {
                title: "Башня баланса",
                ages: ["1-2", "3-4", "5-6"],
                materials: ["крышки"],
                time: ["10"],
                desc: "1. Соберите все пластиковые крышки.\n2. Строим самую высокую башню, ставя крышки друг на друга.\n3. Для старших детей усложняем: строить можно только левой рукой (или не ведущей).\n4. Игра требует концентрации и аккуратности."
            },
            {
                title: "Эмоциональное зеркало",
                ages: ["1-2", "3-4", "5-6"],
                materials: ["🤷‍♀️ Ничего"],
                time: ["3-5", "10"],
                desc: "1. Сядьте напротив ребёнка.\n2. Вы показываете эмоцию (радость, грусть, сильное удивление, гнев), а малыш должен максимально точно её скопировать.\n3. Поменяйтесь ролями: теперь вы повторяете за ним.\n4. Прекрасная практика для развития эмоционального интеллекта."
            },
            {
                title: "Тонет — не тонет",
                ages: ["1-2", "3-4"],
                materials: ["глубокая тарелка", "ложки", "пробка", "мелкие игрушки", "бумага"],
                time: ["10"],
                desc: "1. Соберите разные по весу и материалу предметы.\n2. Перед погружением спросите малыша: «Как думаешь, этот предмет поплывет или утонет?»\n3. По очереди опускайте предметы в воду и проверяйте догадки.\n4. Игра формирует первые физические представления и критическое мышление."
            },
            {
                title: "Пенный шеф-повар",
                ages: ["1-2", "3-4"],
                materials: ["глубокая тарелка", "венчик", "детский шампунь", "вода"],
                time: ["10"],
                desc: "1. Налейте в глубокую тарелку немного воды и капните детский шампунь.\n2. Покажите, как энергично взбивать воду венчиком до появления густой пены.\n3. Одной рукой придерживайте ёмкость, другой — работайте инструментом.\n4. Тренирует кисть, координацию и даёт мощный сенсорный релакс."
            },
            {
                title: "Мокрая губка",
                ages: ["1-2", "3-4"],
                materials: ["губки для посуды", "глубокая тарелка", "вода"],
                time: ["10"],
                desc: "1. Поставьте одну миску с водой, а другую — пустую.\n2. Покажите, как набирать воду в губку и сильно выжимать её в пустую емкость.\n3. Попробуйте губки разной жёсткости и размера.\n4. Игра развивает силу мышц ладони и даёт тактильное расслабление."
            },
            {
                title: "Пластилиновые прятки",
                ages: ["1-2", "3-4"],
                materials: ["мягкий пластилин или тесто", "фасоль"],
                time: ["10"],
                desc: "1. Спрячьте фасолины внутрь большого шара из пластилина.\n2. Задача малыша — найти и достать все «сокровища».\n3. Для усложнения можно прятать мелкие бусины.\n4. Глубокая стимуляция пальцев активирует речевые зоны мозга."
            },
            {
                title: "Сенсорная коробка",
                ages: ["1-2", "3-4"],
                materials: ["рис", "мелкие игрушки"],
                time: ["10"],
                desc: "1. Спрячьте в рисе или другой крупе маленькие фигурки животных.\n2. Пусть малыш найдёт их на ощупь.\n3. Когда животное найдено, попросите ребенка повторить его звук (Му, Гав, Мяу).\n4. Помогает перейти от тактильных ощущений к звукоподражанию."
            },
            {
                title: "Липкая дорожка",
                ages: ["1-2", "3-4"],
                materials: ["малярный скотч", "вата", "перья"],
                time: ["10"],
                desc: "1. Приклейте полоску скотча на стол липкой стороной вверх.\n2. Предложите малышу приклеивать и с трудом отлеплять лёгкие предметы.\n3. Используйте вату, перья или кусочки бумаги.\n4. Развивает «щепотный» захват и учит фокусировке внимания."
            },
            {
                title: "Чистое рисование",
                ages: ["1-2", "3-4"],
                materials: ["цветной картон", "кисточка", "стакан с водой"],
                time: ["10"],
                desc: "1. Дайте малышу кисточку и стаканчик с обычной водой.\n2. Пусть он «красит» яркий картон — от воды он будет темнеть.\n3. Когда вода высохнет, можно рисовать снова.\n4. Подготовка руки к письму без стресса для мамы из-за уборки."
            },
            {
                title: "Магнитная рыбалка",
                ages: ["1-2", "3-4"],
                materials: ["металлический противень", "магниты с холодильника"],
                time: ["10"],
                desc: "1. Разместите магниты на металлическом противне.\n2. Пусть малыш отлепляет их и передвигает по поверхности, создавая узоры.\n3. Обсудите, почему магниты «прилипают».\n4. Развивает силу пальчиков и знакомит со свойствами предметов."
            },
            {
                title: "Копилка для крышек",
                ages: ["1-2", "3-4"],

                        selectedMaterials.delete(mat);
                    }
                }
                updateDropdownText();
            });

            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(mat));
            materialsList.appendChild(label);
        });

        function updateDropdownText() {
            if (selectedMaterials.size === 0) {
                dropdownText.textContent = "Выбрать предметы...";
                dropdownText.classList.remove('text-stone-800');
                dropdownText.classList.add('text-stone-500');
            } else {
                dropdownText.textContent = Array.from(selectedMaterials).join(', ');
                dropdownText.classList.remove('text-stone-500');
                dropdownText.classList.add('text-stone-800');
            }
        }

        dropdownBtn.addEventListener('click', () => {
            dropdownMenu.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownMenu.classList.remove('show');
            }
        });

        let currentGameTitle = "";

        // ── Основная логика ─────────────────────────────────────────────────────────
        document.getElementById('game-form').addEventListener('submit', (e) => {
            e.preventDefault();
            generateGame();
        });

        document.getElementById('next-game-btn').addEventListener('click', () => {
            generateGame();
        });

        function generateGame() {
            const age = document.querySelector('input[name="age"]:checked').value;
            const time = document.querySelector('input[name="time"]:checked').value;
            const mats = Array.from(selectedMaterials);

            if (mats.length === 0) mats.push("🤷‍♀️ Ничего");

            let matches = [];

            games.forEach(game => {
                let ageMatch = game.ages.includes(age);
                let timeMatch = game.time.includes(time);

                let hasMaterials = false;
                if (game.materials.includes("🤷‍♀️ Ничего")) {
                    hasMaterials = true;
                } else {
                    if (!mats.includes("🤷‍♀️ Ничего")) {
                        hasMaterials = game.materials.every(req => mats.includes(req));
                    }
                }

                if (hasMaterials) {
                    let score = 0;
                    if (ageMatch) score += 10;
                    if (timeMatch) score += 5;
                    if (!game.materials.includes("🤷‍♀️ Ничего")) score += 2;
                    matches.push({ game, score });
                }
            });

            matches.sort((a, b) => b.score - a.score);

            let topGames = [];

            if (matches.length > 0 && matches[0].score >= 10) {
                const maxScore = matches[0].score;
                topGames = matches.filter(m => m.score === maxScore).map(m => m.game);
            } else {
                const fallbacks = games.filter(g => g.materials.includes("🤷‍♀️ Ничего") && g.ages.includes(age));
                topGames = fallbacks.length > 0 ? fallbacks : [games.find(g => g.materials.includes("🤷‍♀️ Ничего"))];
            }

            let availableGames = topGames.filter(g => g.title !== currentGameTitle);
            if (availableGames.length === 0) availableGames = topGames;

            const resultGame = availableGames[Math.floor(Math.random() * availableGames.length)];
            currentGameTitle = resultGame.title;

            renderResult(resultGame);
        }

        function renderResult(game) {
            const resBlock = document.getElementById('result-block');
            const resTitle = document.getElementById('res-title');
            const resTags = document.getElementById('res-tags');
            const resDesc = document.getElementById('res-desc');

            resBlock.classList.remove('hidden');
            resBlock.classList.remove('fade-in');
            void resBlock.offsetWidth;
            resBlock.classList.add('fade-in');

            resTitle.textContent = game.title;

            resTags.innerHTML = '';
            const createTag = (text, bgClass) => {
                const span = document.createElement('span');
                span.className = `px-3 py-1 rounded-full text-xs font-bold tracking-wide uppercase ${bgClass}`;
                span.textContent = text;
                resTags.appendChild(span);
            };

            createTag(game.ages.join(', ') + ' лет', 'bg-orange-100 text-orange-700');
            createTag(game.time.join(', ') + ' мин', 'bg-amber-100 text-amber-700');
            game.materials.forEach(m => {
                if (m !== "🤷‍♀️ Ничего") createTag(m, 'bg-stone-200 text-stone-700');
            });

            resDesc.innerHTML = game.desc.split('\n').map(line =>
                `<p class="flex items-start"><span class="mr-2 text-orange-400">•</span> <span>${line.replace(/^\d+\.\s/, '')}</span></p>`
            ).join('');

            setTimeout(() => {
                resBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }
    </script>
</body>
</html>
